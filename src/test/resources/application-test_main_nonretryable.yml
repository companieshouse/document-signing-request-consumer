server:
  port: 8080

spring:
  main:
    allow-bean-definition-overriding: true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}

consumer:
  topic: echo
  group-id: echo-consumer
  max-attempts: 4
  backoff-delay: 100
  concurrency: 1

