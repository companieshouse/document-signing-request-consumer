server:
  port: 8080

spring:
  main:
    allow-bean-definition-overriding: true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}

consumer:
  topic: echo
  group-id: echo-consumer
  max-attempts: 4
  backoff-delay: 100
  concurrency: 1

#error_consumer:
#  topic: echo-error
#  group_id: echo-error-consumer
#  enabled: false
#  dlt: echo-retry
#  concurrency: 1

invalid-message-topic: echo-invalid

logger:
  namespace: archetype-client

steps: 1

# Actuator health check config
management:

  # OpenTelemetry configuration
  opentelemetry:
    logging:
      export:
        otlp:
          endpoint: http://otel-collector:4318/v1/logs
    tracing:
      export:
        otlp:
          endpoint: http://otel-collector:4318/v1/traces
  otlp:
    metrics:
      export:
        url: http://otel-collector:4318/v1/metrics
